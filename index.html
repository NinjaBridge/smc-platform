<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SMC Unified Intelligence Platform — Sign In</title>
  <meta name="robots" content="noindex, nofollow">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300&family=Barlow+Condensed:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

  <!-- Platform CSS -->
  <link rel="stylesheet" href="assets/css/tokens.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="stylesheet" href="assets/css/animations.css">

  <!-- Clerk Auth SDK v5 -->
  <script async crossorigin="anonymous"
    src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@5/dist/clerk.browser.js"
    data-clerk-publishable-key="pk_live_Y2xlcmsua25jb2NwYS1iYXlhcmVhLmNvbSQ">
  </script>

  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  </style>
</head>
<body>

<div class="login-page" id="login-page" style="display:none;">
  <div class="login-container">

    <!-- Brand -->
    <div class="login-brand">
      <svg class="login-logo" viewBox="0 0 64 64" fill="none">
        <path d="M32 4L56 14L56 38Q56 54 32 60Q8 54 8 38L8 14Z"
              fill="rgba(227,6,19,0.08)" stroke="#E30613" stroke-width="2"/>
        <line x1="32" y1="4" x2="32" y2="60" stroke="#E30613" stroke-width="1" opacity="0.4"/>
        <line x1="8" y1="32" x2="56" y2="32" stroke="#E30613" stroke-width="1" opacity="0.4"/>
        <text x="32" y="27" text-anchor="middle"
              font-family="'Bebas Neue', sans-serif" font-size="13" fill="#E30613" letter-spacing="1">SMC</text>
        <text x="32" y="44" text-anchor="middle"
              font-family="'Bebas Neue', sans-serif" font-size="9" fill="#D4A843" letter-spacing="0.5">EST. 2007</text>
      </svg>
      <div class="login-title">Sierra Madre Collection</div>
      <div class="login-subtitle">Unified Intelligence Platform</div>
      <div class="login-divider"></div>
    </div>

    <!-- Clerk Sign-In Mount Point -->
    <div class="login-clerk-container">
      <div id="clerk-sign-in"></div>
    </div>

    <div class="login-footer-text">
      Eagle Rock · Los Angeles CA · Est. 2007 · ASAP Digital Platforms
    </div>

  </div>
</div>

<script>
  window.addEventListener('load', async () => {
    const clerk = window.Clerk;
    if (!clerk) {
      document.getElementById('login-page').style.display = 'flex';
      document.getElementById('clerk-sign-in').innerHTML =
        '<p style="color:var(--alert);font-family:var(--font-mono);font-size:12px;">Auth service unavailable. Please refresh.</p>';
      return;
    }

    await clerk.load();

    if (clerk.user) {
      window.location.href = '/dashboard';
      return;
    }

    document.getElementById('login-page').style.display = 'flex';

    clerk.mountSignIn(document.getElementById('clerk-sign-in'), {
      appearance: {
        variables: {
          colorPrimary:         '#E30613',
          colorBackground:      '#141618',
          colorText:            '#F4F2EE',
          colorTextSecondary:   'rgba(244,242,238,0.6)',
          colorInputBackground: '#0D0F11',
          colorInputText:       '#F4F2EE',
          fontFamily:           "'Barlow', sans-serif",
          borderRadius:         '6px',
        },
        elements: {
          card:       { boxShadow: 'none', background: 'transparent' },
          headerTitle:{ fontFamily: "'Bebas Neue', sans-serif", fontSize: '22px', letterSpacing: '0.06em' },
          footerAction:{ color: 'rgba(244,242,238,0.35)' },
        }
      },
      redirectUrl: '/dashboard',
    });
  });
</script>
</body>
</html>
